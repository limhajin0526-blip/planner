# planner
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 일본 여행 플래너</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- 메인 화면 -->
    <div id="home">

        <h1>🇯🇵 AI 일본 여행 플래너</h1>

        <p class="intro">
            AI가 나만을 위한 일본 여행 일정을 만들어드립니다.
        </p>

        <button id="startBtn">
            여행 시작하기
        </button>

    </div>


    <!-- 여행 정보 입력 화면 -->
    <div id="planner" style="display:none;">

        <h2>여행 정보 입력</h2>

        <label>📅 여행 시기</label>

        <select id="month">

        <option value="1">1월</option>
        <option value="2">2월</option>
        <option value="3">3월</option>
        <option value="4">4월</option>
        <option value="5">5월</option>
        <option value="6">6월</option>
        <option value="7">7월</option>
        <option value="8">8월</option>
        <option value="9">9월</option>
        <option value="10">10월</option>
        <option value="11">11월</option>
        <option value="12">12월</option>

        </select>

        <br><br>

        <label>💴 예산(엔)</label><br>
        <input type="number" id="budget" placeholder="예: 100000">
        
        <br><br>
        
        <label>🎯 여행 스타일</label><br>

<select id="style">

    <option>🍜 음식</option>
    
    <option>👀 볼거리</option>
    
    <option>🛍️ 쇼핑</option>

</select>

<br><br>

        <button id="makePlan">
            AI 여행지 추천받기
        </button>

    </div>



<div id="loading" style="display:none;">

    <h2>🤖 AI가 여행 일정을 만드는 중...</h2>

    <p id="loadingText">
        여행 스타일 분석 중...
    </p>

</div>


<div id="result" style="display:none;">

    <h2>🗓️ AI 여행 추천 결과</h2>

    <div id="planCard"></div>
    <br>

    <button id="restartBtn">
        🔄 다시 여행 계획 만들기
    </button>
    
</div>

</div>

    <script src="script.js"></script>

</body>
</html>
